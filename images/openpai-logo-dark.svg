<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Icon: Neural/circuit node cluster -->
  <g transform="translate(28, 32)">
    <!-- Connection lines -->
    <line x1="48" y1="48" x2="16" y2="16" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="48" y1="48" x2="80" y2="16" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="48" y1="48" x2="16" y2="80" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="48" y1="48" x2="80" y2="80" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="48" y1="48" x2="48" y2="4" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="48" y1="48" x2="48" y2="92" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

    <!-- Outer nodes -->
    <circle cx="16" cy="16" r="5" fill="url(#accent)" opacity="0.7"/>
    <circle cx="80" cy="16" r="5" fill="url(#accent)" opacity="0.7"/>
    <circle cx="16" cy="80" r="5" fill="url(#accent)" opacity="0.7"/>
    <circle cx="80" cy="80" r="5" fill="url(#accent)" opacity="0.7"/>
    <circle cx="48" cy="4" r="4" fill="url(#accent)" opacity="0.5"/>
    <circle cx="48" cy="92" r="4" fill="url(#accent)" opacity="0.5"/>

    <!-- Center node (larger, brighter) -->
    <circle cx="48" cy="48" r="10" fill="url(#accent)" opacity="0.15"/>
    <circle cx="48" cy="48" r="7" fill="url(#accent)"/>
  </g>

  <!-- Text: "Open" (lighter weight, white for dark bg) -->
  <text x="140" y="102" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="62" font-weight="300" fill="#E5E7EB" letter-spacing="-1">Open</text>

  <!-- Text: "PAI" (bold, accented) -->
  <text x="310" y="102" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="62" font-weight="700" fill="url(#accent)" letter-spacing="-0.5">PAI</text>

  <!-- Underline accent -->
  <rect x="140" y="114" width="300" height="2.5" rx="1.25" fill="url(#glow)"/>
</svg>
